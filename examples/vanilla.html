<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lite-phone-input — Vanilla JS Example</title>
  <!-- Run `npm run build` first to generate dist/ files -->
  <link rel="stylesheet" href="../dist/styles.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { font-size: 1.4rem; }
    .output {
      margin-top: 24px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.8;
    }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>lite-phone-input</h1>

  <label for="phone">Phone number</label>
  <div id="phone-container"></div>

  <div class="output" id="output">
    E.164: <span id="e164">—</span><br>
    National: <span id="national">—</span><br>
    Country: <span id="country">—</span><br>
    Valid: <span id="valid">—</span>
  </div>

  <script src="../dist/vanilla/index.global.js"></script>
  <script>
    function formatCountry(country) {
      return country.name + ' (' + country.code + ') +' + country.dialCode;
    }

    var phone = LitePhoneInput.PhoneInput.mount(document.getElementById('phone-container'), {
      defaultCountry: 'US',
      separateDialCode: true,
      preferredCountries: ['US', 'GB', 'DE', 'FR'],
      inputAttributes: {
        id: 'phone',
        name: 'phone',
      },
      onChange: function (e164, country, validation) {
        document.getElementById('e164').textContent = e164 || '\u2014';
        document.getElementById('national').textContent = phone.getNationalNumber() || '\u2014';
        document.getElementById('country').textContent = formatCountry(country);
        document.getElementById('valid').textContent = validation.valid
          ? 'Yes'
          : 'No \u2014 ' + (validation.reason || 'empty') +
            ' (' + validation.currentDigits + '/' +
            validation.minDigits + '\u2013' + validation.maxDigits + ')';
      },
      onCountryChange: function (country) {
        document.getElementById('country').textContent = formatCountry(country);
      },
    });
  </script>
</body>
</html>
